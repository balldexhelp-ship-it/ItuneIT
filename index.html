<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>iTuneIT – Free Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body { background: #000; color: white; font-family: system-ui, sans-serif; }
        .card:hover { transform: translateY(-6px); }
        .card:hover .play-overlay { opacity: 1; }
        audio { width: 100%; height: 34px; margin-top: 8px; }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-7xl mx-auto p-4 md:p-8">

        <header class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-3">
                <img src="https://i.postimg.cc/bwkSCz8P/Untitled1900-20260312002023.png" alt="logo" class="w-12 h-12 rounded-xl">
                <h1 class="text-3xl font-bold">iTuneIT</h1>
            </div>
        </header>

        <!-- Search bar -->
        <div class="mb-12">
            <div class="bg-gray-900 rounded-full flex items-center px-6 py-4 max-w-2xl mx-auto shadow-2xl">
                <i class="fa-solid fa-magnifying-glass text-gray-400 mr-4 text-2xl"></i>
                <input id="search-input" type="text" placeholder="Search songs, artists..." 
                       class="bg-transparent outline-none flex-1 text-lg" autocomplete="off">
            </div>
        </div>

        <!-- Status messages -->
        <div id="loading" class="hidden text-center text-gray-400 py-16 text-xl">Searching...</div>
        <div id="no-results" class="hidden text-center text-gray-400 py-16 text-xl">No results found</div>

        <!-- Results grid -->
        <div id="results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>

        <!-- Bottom mini player -->
        <div class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 p-4 flex items-center gap-4 z-50">
            <img id="player-art" src="https://via.placeholder.com/64" alt="" class="w-14 h-14 rounded object-cover">
            <div class="flex-1 min-w-0">
                <div id="player-title" class="font-medium truncate">Nothing playing</div>
                <div id="player-artist" class="text-sm text-gray-400 truncate">—</div>
            </div>
            <button id="play-pause" class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-black">
                <i class="fa-solid fa-play"></i>
            </button>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const resultsDiv = document.getElementById('results');
        const loadingDiv = document.getElementById('loading');
        const noResultsDiv = document.getElementById('no-results');
        const playerArt = document.getElementById('player-art');
        const playerTitle = document.getElementById('player-title');
        const playerArtist = document.getElementById('player-artist');
        const playPauseBtn = document.getElementById('play-pause');

        let currentAudio = null;
        let isPlaying = false;

        function updatePlayer(title, artist, art) {
            playerArt.src = art || 'https://via.placeholder.com/64';
            playerTitle.textContent = title || 'Nothing playing';
            playerArtist.textContent = artist || '—';
        }

        function playTrack(title, artist, previewUrl, art) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            updatePlayer(title, artist, art);

            if (previewUrl) {
                currentAudio = new Audio(previewUrl);
                currentAudio.play().catch(() => console.log('Autoplay blocked'));
                isPlaying = true;
                playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            }
        }

        playPauseBtn.onclick = () => {
            if (currentAudio) {
                if (isPlaying) {
                    currentAudio.pause();
                    playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                } else {
                    currentAudio.play().catch(() => {});
                    playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                }
                isPlaying = !isPlaying;
            }
        };

        function renderTrack(track) {
            const preview = track.audio || track.audios?.[0]?.download || '';
            const art = track.album_image || track.image || 'https://via.placeholder.com/400';
            const card = document.createElement('div');
            card.className = 'bg-gray-900 p-4 rounded-xl cursor-pointer hover:bg-gray-800 transition card-hover group';
            card.innerHTML = `
                <div class="relative">
                    <img src="${art}" alt="${track.name}" class="w-full aspect-square object-cover rounded-lg mb-3">
                    <div class="play-overlay absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                        <button class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-black shadow-xl">
                            <i class="fa-solid fa-play text-3xl ml-1"></i>
                        </button>
                    </div>
                </div>
                <div class="font-medium truncate">${track.name}</div>
                <div class="text-sm text-gray-400 truncate">${track.artist_name}</div>
                ${preview ? `<audio controls src="${preview}"></audio>` : '<p class="text-xs text-gray-500 mt-2">No preview available</p>'}
            `;
            card.onclick = () => playTrack(track.name, track.artist_name, preview, art);
            resultsDiv.appendChild(card);
        }

        async function search(query = 'electronic') {
            loadingDiv.classList.remove('hidden');
            noResultsDiv.classList.add('hidden');
            resultsDiv.innerHTML = '';

            try {
                const url = `https://api.jamendo.com/v3.0/tracks/?client_id=b6747d04&format=jsonpretty&limit=24&search=${encodeURIComponent(query)}&order=popularity_week`;
                const res = await fetch(url);
                const data = await res.json();

                loadingDiv.classList.add('hidden');

                if (!data.results || data.results.length === 0) {
                    noResultsDiv.classList.remove('hidden');
                    return;
                }

                data.results.forEach(track => renderTrack(track));
            } catch (err) {
                loadingDiv.classList.add('hidden');
                resultsDiv.innerHTML = '<p class="col-span-full text-red-400 text-center py-16">Error loading tracks</p>';
            }
        }

        // Live typing + Enter key
        let timeout = null;
        searchInput.addEventListener('input', e => {
            clearTimeout(timeout);
            timeout = setTimeout(() => search(e.target.value.trim()), 400);
        });

        searchInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                clearTimeout(timeout);
                search(searchInput.value.trim());
            }
        });

        // Start with popular tracks
        search('electronic');
    </script>
</body>
</html>
