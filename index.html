<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>iTuneIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'spotify-black': '#000000',
                        'spotify-dark': '#121212',
                        'spotify-darker': '#0a0a0a',
                        'spotify-gray': '#181818',
                        'spotify-lightgray': '#282828',
                        'spotify-green': '#1DB954',
                    }
                }
            }
        }
    </script>
    <style>
        .card-hover:hover { transform: translateY(-4px); }
        .card-hover:hover .play-btn { opacity: 1; transform: translateY(0); }
        #mobile-menu-toggle { touch-action: manipulation; pointer-events: auto; z-index: 60; }
        audio { width: 100%; height: 34px; margin-top: 8px; }
    </style>
</head>
<body class="bg-spotify-black text-white min-h-screen flex flex-col md:flex-row font-sans">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-spotify-darker border-r border-spotify-lightgray z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-10">
                <img src="https://i.postimg.cc/bwkSCz8P/Untitled1900-20260312002023.png" alt="iTuneIT" class="w-10 h-10 rounded-lg">
                <span class="text-2xl font-bold tracking-tight">iTuneIT</span>
            </div>

            <nav class="space-y-1 mb-10">
                <button onclick="showView('home')" class="w-full flex items-center gap-4 px-4 py-3 rounded-md hover:bg-spotify-lightgray transition text-left nav-home bg-spotify-lightgray">
                    <i class="fa-solid fa-home w-5"></i>
                    <span>Home</span>
                </button>
                <button onclick="showView('search')" class="w-full flex items-center gap-4 px-4 py-3 rounded-md hover:bg-spotify-lightgray transition text-left nav-search">
                    <i class="fa-solid fa-search w-5"></i>
                    <span>Search</span>
                </button>
                <button onclick="showView('library')" class="w-full flex items-center gap-4 px-4 py-3 rounded-md hover:bg-spotify-lightgray transition text-left nav-library">
                    <i class="fa-solid fa-book w-5"></i>
                    <span>Your Library</span>
                </button>
            </nav>

            <div class="mt-6">
                <h3 class="text-xs uppercase tracking-widest text-gray-500 font-semibold mb-4">Recently Played</h3>
                <div id="recent-list" class="space-y-3 text-sm"></div>
            </div>
        </div>
    </aside>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden"></div>

    <!-- Main content -->
    <main class="flex-1 flex flex-col overflow-hidden">

        <!-- Top bar -->
        <header class="h-16 bg-gradient-to-b from-spotify-black to-transparent px-4 md:px-6 flex items-center relative z-50">
            <button id="mobile-menu-toggle" class="md:hidden text-white text-2xl focus:outline-none p-2 -ml-2">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="flex-1 flex justify-center md:justify-start">
                <div class="hidden md:flex items-center gap-3">
                    <button class="w-8 h-8 rounded-full bg-black/40 flex items-center justify-center text-gray-400 hover:text-white">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <button class="w-8 h-8 rounded-full bg-black/40 flex items-center justify-center text-gray-400 hover:text-white">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <div class="hidden md:block flex-1 max-w-xl">
                <div class="bg-spotify-lightgray rounded-full flex items-center px-4 py-2">
                    <i class="fa-solid fa-search text-gray-500 mr-3"></i>
                    <input type="text" placeholder="What do you want to play?" class="bg-transparent outline-none w-full text-sm">
                </div>
            </div>
        </header>

        <!-- Views -->
        <div class="flex-1 overflow-y-auto px-4 sm:px-6 lg:px-8 py-8">

            <!-- Home -->
            <div id="view-home" class="view">
                <h1 class="text-3xl sm:text-4xl font-bold mb-8">Good evening</h1>
                <div id="home-content" class="space-y-10"></div>
            </div>

            <!-- Search -->
            <div id="view-search" class="view hidden flex flex-col items-center pt-10 md:pt-24">
                <h1 class="text-4xl md:text-6xl font-bold mb-10 text-center">Search the way</h1>
                <div class="w-full max-w-2xl px-4">
                    <div class="bg-spotify-lightgray rounded-full flex items-center px-6 py-4 text-lg shadow-2xl">
                        <i class="fa-solid fa-search text-gray-500 mr-4 text-2xl"></i>
                        <input id="search-input" type="text" placeholder="Artists, songs, albums..." class="bg-transparent outline-none flex-1 text-lg" autocomplete="off">
                    </div>
                    <div id="search-results" class="mt-10 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
                    <div id="search-loading" class="hidden col-span-full text-center text-gray-400 py-16 text-lg">Searching...</div>
                    <div id="search-empty" class="hidden col-span-full text-center text-gray-400 py-16 text-lg">No results found</div>
                </div>
            </div>

            <!-- Library -->
            <div id="view-library" class="view hidden">
                <h1 class="text-3xl sm:text-4xl font-bold mb-8">Your Library</h1>
                <p class="text-gray-400 mb-8">Recently played items appear here and in the sidebar.</p>
                <div id="library-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
            </div>
        </div>

        <!-- Bottom player -->
        <div class="fixed bottom-0 left-0 right-0 h-20 bg-spotify-gray border-t border-spotify-lightgray flex items-center px-4 gap-4 z-40">
            <div class="flex items-center gap-3 flex-1 min-w-0">
                <div class="w-12 h-12 bg-gray-800 rounded overflow-hidden flex-shrink-0">
                    <img id="player-cover" src="https://via.placeholder.com/64" alt="" class="w-full h-full object-cover">
                </div>
                <div class="min-w-0">
                    <div id="player-name" class="text-sm font-medium truncate">Nothing playing</div>
                    <div id="player-artist" class="text-xs text-gray-400 truncate">—</div>
                </div>
            </div>

            <div class="flex flex-col items-center gap-1 flex-1 max-w-xs">
                <div class="flex items-center gap-5 md:gap-8 text-gray-300">
                    <button><i class="fa-solid fa-shuffle fa-sm"></i></button>
                    <button><i class="fa-solid fa-backward-step"></i></button>
                    <button id="play-pause-btn" class="w-10 h-10 md:w-12 md:h-12 bg-white rounded-full flex items-center justify-center text-black hover:scale-105 transition">
                        <i class="fa-solid fa-play ml-0.5"></i>
                    </button>
                    <button><i class="fa-solid fa-forward-step"></i></button>
                    <button><i class="fa-solid fa-repeat fa-sm"></i></button>
                </div>
                <div class="w-full h-1 bg-gray-700 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-spotify-green w-0 transition-all duration-300"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Mobile menu
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('mobile-menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (toggleBtn && sidebar && overlay) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                });

                overlay.addEventListener('click', () => {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                });
            }
        });

        let history = JSON.parse(localStorage.getItem('ituneit_recent') || '[]');
        let progressTimer = null;
        let isPlaying = false;
        let currentAudio = null;

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');

            document.querySelectorAll('[onclick^="showView"]').forEach(btn => {
                btn.classList.remove('bg-spotify-lightgray');
            });
            document.querySelector(`[onclick="showView('${viewId}')"]`)?.classList.add('bg-spotify-lightgray');

            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebar-overlay').classList.add('hidden');
            }

            if (viewId === 'search') {
                document.getElementById('search-input').focus();
            }
        }

        function addToHistory(item) {
            history = history.filter(i => i.title !== item.title);
            history.unshift(item);
            if (history.length > 15) history.pop();
            localStorage.setItem('ituneit_recent', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('recent-list');
            container.innerHTML = history.length === 0 ? '<p class="text-gray-500 text-sm">No recent plays</p>' : '';

            history.forEach(item => {
                const el = document.createElement('div');
                el.className = 'flex gap-3 items-center p-2 rounded-md hover:bg-spotify-lightgray cursor-pointer transition';
                el.innerHTML = `
                    <img src="${item.art || 'https://via.placeholder.com/40'}" alt="" class="w-10 h-10 rounded object-cover">
                    <div class="min-w-0">
                        <div class="text-sm truncate">${item.title}</div>
                        <div class="text-xs text-gray-500 truncate">${item.artist}</div>
                    </div>
                `;
                el.onclick = () => playTrack(item);
                container.appendChild(el);
            });

            const libGrid = document.getElementById('library-grid');
            libGrid.innerHTML = '';
            history.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-spotify-gray p-3 rounded-lg cursor-pointer hover:bg-spotify-lightgray transition';
                card.innerHTML = `
                    <img src="${item.art || 'https://via.placeholder.com/200'}" class="w-full aspect-square object-cover rounded mb-2">
                    <div class="text-sm font-medium truncate">${item.title}</div>
                    <div class="text-xs text-gray-400 truncate">${item.artist}</div>
                `;
                card.onclick = () => playTrack(item);
                libGrid.appendChild(card);
            });
        }

        function playTrack(data) {
            document.getElementById('player-cover').src = data.art || 'https://via.placeholder.com/64';
            document.getElementById('player-name').textContent = data.title || 'Unknown';
            document.getElementById('player-artist').textContent = data.artist || '—';

            const bar = document.getElementById('progress-bar');
            bar.style.width = '0%';
            if (progressTimer) clearInterval(progressTimer);

            let progress = 0;
            progressTimer = setInterval(() => {
                progress += 2;
                if (progress >= 100) {
                    clearInterval(progressTimer);
                    progress = 0;
                    isPlaying = false;
                    document.getElementById('play-pause-btn').innerHTML = '<i class="fa-solid fa-play ml-0.5"></i>';
                }
                bar.style.width = progress + '%';
            }, 600);

            document.getElementById('play-pause-btn').innerHTML = '<i class="fa-solid fa-pause"></i>';
            isPlaying = true;
            addToHistory(data);

            // Play preview if available
            if (data.preview) {
                if (currentAudio) currentAudio.pause();
                currentAudio = new Audio(data.preview);
                currentAudio.play().catch(() => console.log('Autoplay blocked'));
            }
        }

        document.getElementById('play-pause-btn').onclick = () => {
            if (currentAudio) {
                if (isPlaying) {
                    currentAudio.pause();
                    document.getElementById('play-pause-btn').innerHTML = '<i class="fa-solid fa-play ml-0.5"></i>';
                } else {
                    currentAudio.play().catch(() => {});
                    document.getElementById('play-pause-btn').innerHTML = '<i class="fa-solid fa-pause"></i>';
                }
                isPlaying = !isPlaying;
            }
        };

        async function loadHomeAlbums() {
            const container = document.getElementById('home-content');
            container.innerHTML = '<p class="text-center text-gray-500 py-16">Loading popular albums...</p>';

            try {
                const terms = ['popular', 'new music', 'trending', 'top charts'];
                const term = terms[Math.floor(Math.random() * terms.length)];

                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=18&country=us`);
                const data = await res.json();

                if (!data.results?.length) throw new Error('No results');

                container.innerHTML = '';
                const section = document.createElement('div');
                section.innerHTML = `
                    <h2 class="text-2xl font-bold mb-6">Popular right now</h2>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
                        ${data.results.map(item => {
                            const art = item.artworkUrl100?.replace('100x100', '600x600') || 'https://via.placeholder.com/600';
                            return `
                                <div class="bg-spotify-gray p-4 rounded-xl cursor-pointer card-hover group">
                                    <div class="relative">
                                        <img src="${art}" alt="${item.collectionName}" class="w-full aspect-square object-cover rounded-lg mb-3">
                                        <button class="play-btn absolute bottom-5 right-5 w-10 h-10 bg-spotify-green rounded-full flex items-center justify-center opacity-0 translate-y-2 group-hover:opacity-100 group-hover:translate-y-0 transition shadow-lg">
                                            <i class="fa-solid fa-play text-black ml-1"></i>
                                        </button>
                                    </div>
                                    <div class="font-medium text-sm truncate">${item.collectionName}</div>
                                    <div class="text-xs text-gray-400 truncate">${item.artistName}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);

                container.querySelectorAll('.card-hover').forEach(card => {
                    card.onclick = () => {
                        const titleEl = card.querySelector('.font-medium');
                        const artistEl = card.querySelector('.text-gray-400');
                        const img = card.querySelector('img');
                        playTrack({
                            title: titleEl.textContent,
                            artist: artistEl.textContent,
                            art: img.src,
                            preview: '' // albums don't have preview, so skip
                        });
                    };
                });
            } catch (err) {
                container.innerHTML = '<p class="text-center text-gray-500 py-16">Could not load albums</p>';
            }
        }

        // Live search + Enter support with iTunes (songs + previews)
        const searchInput = document.getElementById('search-input');
        const resultsDiv = document.getElementById('search-results');
        const loadingDiv = document.getElementById('search-loading');
        const emptyDiv = document.getElementById('search-empty');

        let searchTimeout = null;

        function doSearch(query) {
            if (query.length < 2) {
                resultsDiv.innerHTML = '';
                loadingDiv.classList.add('hidden');
                emptyDiv.classList.add('hidden');
                return;
            }

            loadingDiv.classList.remove('hidden');
            emptyDiv.classList.add('hidden');
            resultsDiv.innerHTML = '';

            fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=20&country=us`)
                .then(res => res.json())
                .then(data => {
                    loadingDiv.classList.add('hidden');

                    if (data.results.length === 0) {
                        emptyDiv.classList.remove('hidden');
                        return;
                    }

                    resultsDiv.innerHTML = '';
                    data.results.forEach(item => {
                        const preview = item.previewUrl || '';
                        const art = item.artworkUrl100?.replace('100x100', '400x400') || 'https://via.placeholder.com/400';
                        const card = document.createElement('div');
                        card.className = 'bg-spotify-gray p-3 rounded-xl cursor-pointer card-hover group';
                        card.innerHTML = `
                            <div class="relative">
                                <img src="${art}" class="w-full aspect-square object-cover rounded mb-2">
                                <button class="play-btn absolute bottom-3 right-3 w-9 h-9 bg-spotify-green rounded-full flex items-center justify-center opacity-0 translate-y-2 group-hover:opacity-100 group-hover:translate-y-0 transition shadow-lg">
                                    <i class="fa-solid fa-play text-black ml-1 text-sm"></i>
                                </button>
                            </div>
                            <div class="text-sm font-medium truncate">${item.trackName}</div>
                            <div class="text-xs text-gray-400 truncate">${item.artistName}</div>
                            ${preview ? `<audio controls src="${preview}"></audio>` : '<p class="text-xs text-gray-500 mt-2">No preview</p>'}
                        `;
                        card.onclick = () => playTrack({
                            title: item.trackName,
                            artist: item.artistName,
                            art,
                            preview
                        });
                        resultsDiv.appendChild(card);
                    });
                })
                .catch(() => {
                    loadingDiv.classList.add('hidden');
                    resultsDiv.innerHTML = '<p class="col-span-full text-red-400 text-center py-16">Error loading results</p>';
                });
        }

        searchInput.addEventListener('input', e => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            searchTimeout = setTimeout(() => doSearch(query), 400);
        });

        searchInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                clearTimeout(searchTimeout);
                doSearch(searchInput.value.trim());
            }
        });

        // Init
        loadHomeAlbums();
        renderHistory();
        showView('home');
    </script>
</body>
</html>
